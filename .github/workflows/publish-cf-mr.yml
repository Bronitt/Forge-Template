name: Releases to CurseForge and/or Modrinth

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'
          cache-dependency-path: |
            **/*.gradle*
            **/buildscript.properties
            **/gradle-wrapper.properties
            **/gradle.lockfile

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew --build-cache --info --stacktrace build --no-daemon

      - name: Get Changes between Tags
        id: changes
        uses: simbo/changes-between-tags-action@v1

      - uses: Kir-Antipov/mc-publish@v3.3.0
        with:
          # Only include this section if you wish to publish
          # your assets on Modrinth.
          modrinth-id: placeholder
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # Only include this section if you wish to publish
          # your assets on CurseForge.
          curseforge-id: placeholder
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: |
            build/libs/*.jar
          loaders: forge
          game-versions: 1.12.2
          java: |
            8
          version: ${{ steps.changes.outputs.tag }}
          changelog: ${{ steps.changes.outputs.changes }}